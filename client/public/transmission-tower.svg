<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2847;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2d3e5f;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="url(#skyGradient)"/>
  
  <!-- Distant towers (left) -->
  <g opacity="0.3" stroke="#1a3a52" stroke-width="1.5" fill="none">
    <line x1="80" y1="400" x2="100" y2="900"/>
    <line x1="120" y1="400" x2="100" y2="900"/>
    <line x1="50" y1="600" x2="100" y2="900"/>
    <line x1="150" y1="600" x2="100" y2="900"/>
  </g>
  
  <!-- Distant towers (right) -->
  <g opacity="0.3" stroke="#1a3a52" stroke-width="1.5" fill="none">
    <line x1="700" y1="450" x2="720" y2="900"/>
    <line x1="680" y1="450" x2="720" y2="900"/>
    <line x1="750" y1="600" x2="720" y2="900"/>
    <line x1="650" y1="600" x2="720" y2="900"/>
  </g>
  
  <!-- Main transmission tower -->
  <g stroke="#2563eb" stroke-width="3" fill="none" filter="url(#glow)">
    <!-- Tower base (wide at bottom) -->
    <line x1="350" y1="200" x2="280" y2="800"/>
    <line x1="450" y1="200" x2="520" y2="800"/>
    
    <!-- Tower cross members -->
    <line x1="280" y1="350" x2="520" y2="350"/>
    <line x1="275" y1="500" x2="525" y2="500"/>
    <line x1="270" y1="650" x2="530" y2="650"/>
    
    <!-- Diagonal bracing -->
    <line x1="350" y1="200" x2="280" y2="350"/>
    <line x1="350" y1="200" x2="520" y2="350"/>
    <line x1="280" y1="350" x2="350" y2="500"/>
    <line x1="520" y1="350" x2="350" y2="500"/>
    <line x1="350" y1="500" x2="270" y2="650"/>
    <line x1="350" y1="500" x2="530" y2="650"/>
    
    <!-- Tower insulators -->
    <circle cx="280" cy="350" r="6" fill="#0ea5e9" opacity="0.8"/>
    <circle cx="520" cy="350" r="6" fill="#0ea5e9" opacity="0.8"/>
    <circle cx="275" cy="500" r="5" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="525" cy="500" r="5" fill="#0ea5e9" opacity="0.7"/>
  </g>
  
  <!-- Power lines curving across -->
  <g stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.7">
    <!-- Left line -->
    <path d="M 150 300 Q 400 200 700 320" stroke-linecap="round"/>
    <!-- Middle line -->
    <path d="M 140 380 Q 400 280 720 400" stroke-linecap="round"/>
    <!-- Right line -->
    <path d="M 160 460 Q 400 360 710 480" stroke-linecap="round"/>
    <!-- Return line -->
    <path d="M 120 320 Q 350 220 680 340" stroke-linecap="round" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Distant power line poles -->
  <g opacity="0.25" stroke="#1a3a52" stroke-width="1" fill="none">
    <line x1="200" y1="300" x2="200" y2="700"/>
    <line x1="600" y1="350" x2="600" y2="750"/>
  </g>
  
  <!-- Horizon atmospheric effect -->
  <rect y="600" width="800" height="400" fill="#0f172a" opacity="0.3"/>
</svg>
